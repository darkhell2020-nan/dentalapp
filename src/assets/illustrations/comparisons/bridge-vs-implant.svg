<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Bridge versus implant</title>
  <desc id="desc">Clinical dental illustration</desc>
  <defs>
    <linearGradient id="toothGrad" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#E8E1D6"/>
    </linearGradient>
    <linearGradient id="gumGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7A5AE"/>
      <stop offset="100%" stop-color="#D96C7A"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3F6F8"/>
      <stop offset="45%" stop-color="#A9B4BE"/>
      <stop offset="100%" stop-color="#68737D"/>
    </linearGradient>
    <linearGradient id="zirconiaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DDE8EA"/>
    </linearGradient>
    <linearGradient id="acrylicGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8BAC2"/>
      <stop offset="100%" stop-color="#D98492"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F2430" flood-opacity=".14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F2430" flood-opacity=".10"/>
    </filter>
    <style>
      .outline{stroke:#17384A;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#17384A;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .tooth{fill:url(#toothGrad)}
      .gum{fill:url(#gumGrad)}
      .metal{fill:url(#metalGrad)}
      .enamel{fill:#FFF9EC}
      .dentine{fill:#F2D6A8}
      .pulp{fill:#D85D68}
      .bone{fill:#E7D9C4}
      .navy{fill:#17384A}
      .teal{fill:#3B8C88}
      .cyan{fill:#7EC8C5}
      .amber{fill:#E9A23B}
      .danger{fill:#C84F5F}
      .muted{fill:#8CA0AA}
    </style>
  </defs>
  <rect width="1600" height="1000" fill="#F7FAFC"/>
  <rect x="65" y="65" width="1470" height="870" rx="52" fill="#FFFFFF" filter="url(#shadow)"/>

<line x1="800" y1="150" x2="800" y2="850" stroke="#DDE7EA" stroke-width="5" stroke-dasharray="16 16"/>
    <circle cx="800" cy="500" r="34" fill="#FFFFFF" stroke="#DDE7EA" stroke-width="5"/>
    <path d="M787 488 L775 500 L787 512 M813 488 L825 500 L813 512" fill="none" stroke="#3B8C88" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
<g><rect x="250" y="420" width="150" height="210" rx="55" fill="url(#zirconiaGrad)" stroke="#17384A" stroke-width="7"/><rect x="430" y="390" width="150" height="200" rx="55" fill="url(#zirconiaGrad)" stroke="#17384A" stroke-width="7"/><rect x="610" y="420" width="150" height="210" rx="55" fill="url(#zirconiaGrad)" stroke="#17384A" stroke-width="7"/><rect x="350" y="475" width="310" height="70" rx="30" fill="url(#zirconiaGrad)" stroke="#17384A" stroke-width="7"/></g>
<path d="M1110 500 L1110 760" stroke="#68737D" stroke-width="72" stroke-linecap="round"/><path d="M1070 565 L1150 565 M1065 625 L1155 625 M1060 685 L1160 685" stroke="#F4F7F8" stroke-width="10"/><path d="M1020 365 C1040 280 1090 250 1115 275 C1145 245 1200 285 1210 365 C1215 420 1180 465 1115 470 C1050 465 1008 420 1020 365 Z" fill="url(#zirconiaGrad)" stroke="#17384A" stroke-width="7"/>
</svg>