      .tooth{fill:url(#toothGrad)}
      .gum{fill:url(#gumGrad)}
      .metal{fill:url(#metalGrad)}
      .enamel{fill:#FFF9EC}
      .dentine{fill:#F2D6A8}
      .pulp{fill:#D85D68}
      .bone{fill:#E7D9C4}
      .navy{fill:#17384A}
