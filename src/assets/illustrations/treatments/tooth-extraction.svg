<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Tooth extraction</title>
  <desc id="desc">Clinical dental illustration</desc>
  <defs>
    <linearGradient id="toothGrad" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#E8E1D6"/>
    </linearGradient>
    <linearGradient id="gumGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7A5AE"/>
      <stop offset="100%" stop-color="#D96C7A"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3F6F8"/>
      <stop offset="45%" stop-color="#A9B4BE"/>
      <stop offset="100%" stop-color="#68737D"/>
    </linearGradient>
    <linearGradient id="zirconiaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DDE8EA"/>
    </linearGradient>
    <linearGradient id="acrylicGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8BAC2"/>
      <stop offset="100%" stop-color="#D98492"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F2430" flood-opacity=".14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F2430" flood-opacity=".10"/>
    </filter>
    <style>
      .outline{stroke:#17384A;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#17384A;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .tooth{fill:url(#toothGrad)}
      .gum{fill:url(#gumGrad)}
      .metal{fill:url(#metalGrad)}
      .enamel{fill:#FFF9EC}
      .dentine{fill:#F2D6A8}
      .pulp{fill:#D85D68}
      .bone{fill:#E7D9C4}
      .navy{fill:#17384A}
      .teal{fill:#3B8C88}
      .cyan{fill:#7EC8C5}
      .amber{fill:#E9A23B}
      .danger{fill:#C84F5F}
      .muted{fill:#8CA0AA}
    </style>
  </defs>
  <rect width="1600" height="1000" fill="#F7FAFC"/>
  <rect x="65" y="65" width="1470" height="870" rx="52" fill="#FFFFFF" filter="url(#shadow)"/>

