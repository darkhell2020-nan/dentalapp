      C 720.0 890.0, 655.0 860.0, 665.0 755.0
      L 695.0 455.0
      C 650.0 400.0, 595.0 350.0, 610.0 280.0 Z"
      class="tooth outline"/>
<path d="M 655.0 290.0
      C 620.0 225.0, 705.0 185.0, 770.0 230.0
      C 820.0 185.0, 895.0 180.0, 945.0 245.0
      C 980.0 300.0, 925.0 370.0, 890.0 425.0
      L 855.0 690.0
