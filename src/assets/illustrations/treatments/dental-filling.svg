      C 830.0 235.0, 875.0 260.0, 860.0 305.0
      L 825.0 685.0
      C 819.0 730.0, 805.0 725.0, 800 675.0
      L 795.0 475.0
      L 775.0 685.0
      C 768.0 730.0, 755.0 720.0, 760.0 670.0
