<path d="M 865.0 205.0 C 905.0 225.0, 905.0 275.0, 880.0 305.0
        C 855.0 325.0, 830.0 295.0, 838.0 255.0 Z" fill="#7B5A3B" opacity=".95"/>
<path d="M835 205 C885 215 900 280 865 320 C835 348 800 320 808 280 Z" fill="#EEF4F5" stroke="#17384A" stroke-width="7"/>
<g>
      <rect x="1130" y="170" width="260" height="66" rx="22" fill="#EEF4F5" stroke="#D6E4E6" stroke-width="3"/>
      <text x="1156" y="213" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#17384A">Composite filling</text>
    </g>
</svg>